<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="t">Domain for sale</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0f1115;color:#e8e8ea;padding:24px}
  .card{max-width:520px;width:100%;text-align:center}
  .pill{display:inline-block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:#9aa0a6;border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:6px 14px;margin-bottom:28px}
  .domain{font-size:clamp(28px,6vw,46px);font-weight:600;letter-spacing:-.01em;margin:0 0 16px;word-break:break-word}
  .sub{font-size:17px;line-height:1.6;color:#a8adb4;margin:0 0 32px}
  .btn{display:inline-block;text-decoration:none;font-size:15px;font-weight:500;
    background:#e8e8ea;color:#0f1115;border-radius:10px;padding:13px 26px;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .foot{margin-top:40px;font-size:13px;color:#6b7078}
  a.mail{color:#a8adb4}
</style>
</head>
<body>
  <main class="card">
    <span class="pill">This domain is for sale</span>
    <h1 class="domain" id="d">this domain</h1>
    <p class="sub">This domain is available for purchase. If you&rsquo;re interested in acquiring it, get in touch.</p>
    <a class="btn" id="cta" href="#">Make an inquiry</a>
    <p class="foot">or email <a class="mail" id="mail" href="#">sanz.andre@gmail.com</a></p>
  </main>
  <script>
    var host=location.hostname.replace(/^www\./,'');
    document.getElementById('d').textContent=host;
    document.getElementById('t').textContent=host+' — for sale';
    var to='sanz.andre@gmail.com';
    var href='mailto:'+to+'?subject='+encodeURIComponent('Inquiry about '+host);
    document.getElementById('cta').href=href;
    var m=document.getElementById('mail');m.href=href;m.textContent=to;
  </script>
</body>
</html>
